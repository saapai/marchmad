<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#09090b;--s1:#111114;--s2:#18181c;--s3:#222228;--s4:#2c2c34;
      --t0:#fafafa;--t1:#e0e0e6;--t2:#9898a4;--t3:#686878;--t4:#484858;
      --bd:rgba(255,255,255,.05);--bds:rgba(255,255,255,.08);
      --em:#34d399;--emd:rgba(52,211,153,.08);
      --ro:#fb7185;--rod:rgba(251,113,133,.08);
      --sk:#7dd3fc;--skd:rgba(125,211,252,.08);
      --vi:#c4b5fd;--vid:rgba(196,181,253,.08);
      --am:#fcd34d;--amd:rgba(252,211,77,.08);
      --or:#fdba74;--ord:rgba(253,186,116,.08);
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;-webkit-font-smoothing:antialiased}
    .m{font-family:'JetBrains Mono',monospace}
    .c{max-width:1080px;margin:0 auto;padding:0 20px}

    .hd{padding:40px 0 20px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .hd h1{font-size:22px;font-weight:800;color:var(--t0);letter-spacing:-.3px}
    .hd .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3)}
    .live{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--em);padding:3px 10px;border-radius:5px;background:var(--emd)}
    .live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--em);animation:p 2s infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

    .sec{margin:32px 0}
    .sh{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
    .st{font-size:15px;font-weight:700;color:var(--t0)}
    .tg{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}

    /* Table */
    .tw{overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:860px}
    th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t4);padding:10px 10px;text-align:left;border-bottom:1px solid var(--bds);background:var(--s1);position:sticky;top:0;z-index:1;cursor:default}
    th[data-tip]{position:relative}
    th[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);top:calc(100% + 6px);background:#1a1a22;color:var(--t0);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;white-space:nowrap;padding:6px 12px;border-radius:6px;border:1px solid var(--s4);pointer-events:none;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.6)}
    th.r,td.r{text-align:right}th.c,td.c{text-align:center}
    td{padding:8px 10px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
    tr:hover td{background:rgba(255,255,255,.012)}
    tr.g td{background:rgba(252,211,77,.03)}
    tr.sv td{background:rgba(192,192,192,.02)}
    tr.bz td{background:rgba(205,127,50,.02)}
    .rk{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--t3)}
    .rk.g{color:#fcd34d}.rk.sv{color:#c0c0c0}.rk.bz{color:#cd7f32}
    .cb{display:inline-flex;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;white-space:nowrap}
    .nm{font-weight:600;color:var(--t0);font-size:13px}
    .ow{font-size:10px;color:var(--t4)}
    .pt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--t0)}
    .pc{font-family:'JetBrains Mono',monospace;font-size:11px}
    .rc{font-family:'JetBrains Mono',monospace;font-size:11px}.rc .w{color:var(--em)}.rc .l{color:var(--ro)}
    .rp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}
    .pj{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
    .mx{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4)}

    /* Champ cards */
    .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px}
    .cc{padding:14px;border-radius:8px;background:var(--s1);border:1px solid var(--bd);display:flex;flex-direction:column;gap:6px}
    .cc .tn{font-weight:700;font-size:15px;color:var(--t0)}
    .cc .odds{display:flex;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);flex-wrap:wrap}
    .cc .odds span{white-space:nowrap}
    .cc .bar{height:4px;border-radius:2px;background:var(--s3);overflow:hidden;margin:2px 0}
    .cc .bar-f{height:100%;border-radius:2px}
    .cc .names{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
    .cc .np{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--s2);color:var(--t2)}

    /* Round sections */
    .rnd{margin-top:28px}
    .rnd-h{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
    .rnd-t{font-size:14px;font-weight:700;color:var(--t0)}
    .rnd-pts{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:2px 6px;border-radius:3px;background:var(--s2)}

    /* Matchup card */
    .gm{display:grid;grid-template-columns:1fr 72px 1fr;border-radius:8px;border:1px solid var(--bd);background:var(--s1);margin-bottom:8px;overflow:hidden}
    .gm.dim{opacity:.4}
    .gs{padding:14px 16px;display:flex;flex-direction:column;gap:4px}
    .gs.r{text-align:right;align-items:flex-end}
    .gm-m{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--s2);border-left:1px solid var(--bd);border-right:1px solid var(--bd);gap:2px;padding:8px 4px}
    .gm-m .rd{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--t4)}
    .gm-m .vs{font-weight:800;font-size:12px;color:var(--t4)}
    .gm-m .cs{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
    .gm-m .fin{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;background:var(--emd);color:var(--em)}
    .gm .tn{font-weight:700;font-size:16px;color:var(--t0);line-height:1.2}
    .gm .sd{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);font-weight:400}
    .gm .st2{display:flex;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10px;flex-wrap:wrap}
    .gs.r .st2{justify-content:flex-end}
    .gm .sl{color:var(--t4)}.gm .sv2{font-weight:600}
    .gm .pk{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
    .gs.r .pk{justify-content:flex-end}
    .gm .pp{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--s3);color:var(--t2)}
    .gm-ex{grid-column:1/-1;padding:6px 16px;background:var(--s2);border-top:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
    .gm-ex .el{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t4);margin-right:3px}
    .gm-ex .ep{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--rod);color:var(--ro);text-decoration:line-through}
    .gm-ex .ap{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--s3);color:var(--t2)}

    footer{padding:16px 0;border-top:1px solid var(--bd);margin-top:20px}
    footer p{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4)}

    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

    @media(max-width:700px){
      .gm{grid-template-columns:1fr;margin-bottom:16px}
      .gm-m{flex-direction:row;border-left:none;border-right:none;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:6px 12px}
      .gs.r{text-align:left;align-items:flex-start}.gs.r .st2{justify-content:flex-start}.gs.r .pk{justify-content:flex-start}
      .cg{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
<div class="c">

];
const T=B.length;
const S16=[["Duke",1,"St. John's",5,73,"pending"],["UConn",2,"Michigan St",3,55,"pending"],["Iowa",9,"Nebraska",4,47,"pending"],["Houston",2,"Illinois",3,58,"pending"],["Arizona",1,"Arkansas",4,80,"pending"],["Purdue",2,"Texas",11,74,"pending"],["Michigan",1,"Alabama",4,80,"pending"],["Iowa State",2,"Tennessee",6,65,"pending"]];
const S16R=["East","East","South","South","West","West","Midwest","Midwest"];
const E8L=["East Final","South Final","West Final","Midwest Final"];
const FFL=["East vs South","West vs Midwest"];
const AL=new Set(["Duke","St. John's","UConn","Michigan St","Iowa","Nebraska","Houston","Illinois","Arizona","Arkansas","Purdue","Texas","Michigan","Alabama","Iowa State","Tennessee"]);
const PS={Duke:.73,"St. John's":.27,UConn:.55,"Michigan St":.45,Houston:.58,Illinois:.42,Arizona:.80,Arkansas:.20,Purdue:.74,Texas:.26,Michigan:.80,Alabama:.20,"Iowa State":.65,Tennessee:.35};
const PE={Duke:.52,"St. John's":.16,"Michigan St":.16,UConn:.16,Houston:.41,Illinois:.28,Nebraska:.20,Iowa:.11,Arizona:.58,Purdue:.30,Arkansas:.09,Texas:.04,Michigan:.56,"Iowa State":.27,Tennessee:.12,Alabama:.06};
const PF={Duke:.33,Houston:.20,Illinois:.10,Michigan:.35,Arizona:.32,Purdue:.12,"Iowa State":.10,UConn:.05,"Michigan St":.05,"St. John's":.05,Arkansas:.03,Tennessee:.02,Nebraska:.02,Iowa:.01,Alabama:.01,Texas:.005};
const PC={Duke:.18,Michigan:.21,Arizona:.215,Houston:.11,Purdue:.056,Illinois:.061,"Iowa State":.053,UConn:.033,"Michigan St":.028,"St. John's":.026,Arkansas:.021,Tennessee:.015,Nebraska:.013,Iowa:.01,Alabama:.01,Texas:.005};

function cbg(t){return{Duke:"rgba(0,48,135,.15)",Michigan:"rgba(255,203,5,.08)",Arizona:"rgba(204,0,51,.10)",Houston:"rgba(200,16,46,.10)","Iowa State":"rgba(200,16,46,.10)",Purdue:"rgba(206,184,136,.08)"}[t]||"var(--s3)"}
function cfg(t){return{Duke:"#93b4f7",Michigan:"#fcd34d",Arizona:"#fb7185",Houston:"#fb7185","Iowa State":"#fb7185",Purdue:"#e2d5b8"}[t]||"var(--t2)"}

function proj(b){
  let e=b.s;
  b.s16.forEach((pk,i)=>{if(S16[i][5]!=="resolved")e+=40*(PS[pk]||0)});
  b.e8.forEach(pk=>{e+=80*(AL.has(pk)?PE[pk]||0:0)});
  b.ff.forEach(pk=>{e+=160*(AL.has(pk)?PF[pk]||0:0)});
  e+=320*(AL.has(b.ch)?PC[b.ch]||0:0);
  return Math.round(e);
}

// Leaderboard
function renderLeaderboard(){
  const el=document.getElementById('lb');el.innerHTML='';let rk=0,pv=-1;
  B.forEach((b,i)=>{
    if(b.s!==pv){rk=i+1;pv=b.s}
    const pj=proj(b);
    const mc=rk===1?'g':rk===2?'sv':rk<=3?'bz':'';
    const rc=rk===1?'g':rk===2?'sv':rk<=3?'bz':'';
    const pcc=b.p>=90?'var(--em)':b.p>=70?'var(--t1)':b.p>=50?'var(--t2)':'var(--t3)';
    const pjc=pj>=780?'var(--em)':pj>=700?'var(--sk)':'var(--t2)';
    el.innerHTML+=`<tr class="${rc}"><td class="c"><span class="rk ${mc}">${rk}</span></td>

      <td><div class="nm">${b.n}</div><div class="ow">${b.o}</div></td>
      <td class="r"><span class="pt">${b.s}</span></td>
      <td class="r"><span class="pc" style="color:${pcc}">${b.p.toFixed(1)}</span></td>
      <td class="r"><span class="pj" style="color:${pjc}">${pj}</span></td>
      <td class="r"><span class="mx">${b.mx}</span></td>
      <td class="r"><span class="rc"><span class="w">${b.w}W</span><span style="color:var(--t4)">-</span><span class="l">${b.l}L</span></span></td>
      <td class="r"><span class="rp">${b.r64}</span></td>
      <td class="r"><span class="rp">${b.r32}</span></td></tr>`;
  });
}
renderLeaderboard();

// Champion cards with entries listed
function renderChampCards(){
  const el=document.getElementById('cg');el.innerHTML='';
  const ct={};B.forEach(b=>{if(!ct[b.ch])ct[b.ch]={count:0,names:[]};ct[b.ch].count++;ct[b.ch].names.push(b.n)});
  const sorted=Object.entries(ct).sort((a,b)=>b[1].count-a[1].count);
  const mx=sorted[0][1].count;
  sorted.forEach(([team,d])=>{
    const pct=Math.round(d.count/T*100);
    const m=MK[team];const pp=m?m.p:0,kp=m?m.k:0;
    const names=d.names.map(n=>`<span class="np">${n}</span>`).join('');
    el.innerHTML+=`<div class="cc">
      <div style="display:flex;justify-content:space-between;align-items:baseline"><span class="tn">${team}</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)">${d.count}/${T}</span></div>
      <div class="bar"><div class="bar-f" style="width:${d.count/mx*100}%;background:var(--em)"></div></div>
      <div style="margin:2px 0"><span style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:var(--em)">${pct}%</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);margin-left:4px">pool</span></div>
      <div class="odds">
        <span style="color:var(--vi)">Poly ${pp}%</span>
        <span style="color:var(--sk)">Kalshi ${kp}%</span>
        ${m?`<span style="color:var(--t3)">${m.b}</span>`:''}
      </div>
      <div class="names">${names}</div>
    </div>`;
  });
}
renderChampCards();

// Games grouped by round, sorted by controversy within each
function renderRounds(){
  const el=document.getElementById('rounds');el.innerHTML='';

  function gather(type,slots){
    const games=[];
    slots.forEach((slot,i)=>{
      const picks={},dead={};
      B.forEach(b=>{
        const pk=type==='s16'?b.s16[i]:type==='e8'?b.e8[i]:type==='ff'?b.ff[i]:b.ch;
        if(AL.has(pk)){if(!picks[pk])picks[pk]={c:0,n:[]};picks[pk].c++;picks[pk].n.push(b.n)}
        else{if(!dead[pk])dead[pk]={c:0,n:[]};dead[pk].c++;dead[pk].n.push(b.n)}
      });
      const liveTotal=Object.values(picks).reduce((s,v)=>s+v.c,0);
      const topC=Math.max(...Object.values(picks).map(v=>v.c),0);
      const ctrv=liveTotal>1?Math.round((1-topC/liveTotal)*100):0;
      games.push({i,picks,dead,ctrv,...slot});
    });
    games.sort((a,b)=>b.ctrv-a.ctrv);
    return games;
  }

  const s16Slots=S16.map((m,i)=>({t1:m[0],s1:m[1],t2:m[2],s2:m[3],p1:m[4],p2:100-m[4],st:m[5],win:m[6],reg:S16R[i]}));
  const e8Slots=E8L.map((l,i)=>({label:l}));
  const ffSlots=FFL.map((l,i)=>({label:l}));
  const chSlots=[{label:"National Champion"}];

  const rounds=[
    {name:"Sweet 16",pts:40,games:gather('s16',s16Slots),type:'s16'},
    {name:"Elite 8",pts:80,games:gather('e8',e8Slots),type:'e8'},
    {name:"Final Four",pts:160,games:gather('ff',ffSlots),type:'ff'},
    {name:"Championship",pts:320,games:gather('ch',chSlots),type:'ch'},
  ];

  const probMap={s16:PS,e8:PE,ff:PF,ch:PC};

  rounds.forEach(round=>{
    let html=`<div class="rnd"><div class="rnd-h"><span class="rnd-t">${round.name}</span><span class="rnd-pts">${round.pts} pts per correct pick</span></div>`;

    round.games.forEach(g=>{
      const sorted=Object.entries(g.picks).sort((a,b)=>b[1].c-a[1].c);
      const deadSorted=Object.entries(g.dead).sort((a,b)=>b[1].c-a[1].c);
      const isResolved=g.st==='resolved';

      let lt,rt,ls,rs,lp,rp,lc,rc,ln,rn;
      if(round.type==='s16'){
        lt=g.t1;rt=g.t2;ls=`(${g.s1})`;rs=`(${g.s2})`;lp=g.p1;rp=g.p2;
        lc=g.picks[g.t1]?g.picks[g.t1].c:0;rc=g.picks[g.t2]?g.picks[g.t2].c:0;
        ln=g.picks[g.t1]?g.picks[g.t1].n:[];rn=g.picks[g.t2]?g.picks[g.t2].n:[];
      } else {
        if(sorted.length>=2){lt=sorted[0][0];rt=sorted[1][0];lc=sorted[0][1].c;rc=sorted[1][1].c;ln=sorted[0][1].n;rn=sorted[1][1].n}
        else if(sorted.length===1){lt=sorted[0][0];rt='—';lc=sorted[0][1].c;rc=0;ln=sorted[0][1].n;rn=[]}
        else{lt='—';rt='—';lc=0;rc=0;ln=[];rn=[]}
        ls='';rs='';
        const pm=probMap[round.type];
        const p1=pm[lt]||0,p2=pm[rt]||0,tot=p1+p2||1;
        lp=Math.round(p1/tot*100);rp=Math.round(p2/tot*100);
      }

      const cScore=g.ctrv;
      const cCol=cScore>=50?'var(--ro)':cScore>=30?'var(--or)':'var(--am)';
      const cBg=cScore>=50?'var(--rod)':cScore>=30?'var(--ord)':'var(--amd)';
      const region=g.reg||g.label||'';

      const lpk=ln.map(n=>`<span class="pp">${n}</span>`).join('');
      const rpk=rn.map(n=>`<span class="pp">${n}</span>`).join('');

      // Extra picks (teams beyond the top 2)
      let extraHtml='';
      const extras=[...sorted.slice(2).map(([t,d])=>({t,c:d.c,n:d.n,dead:false})),...deadSorted.map(([t,d])=>({t,c:d.c,n:d.n,dead:true}))];
      if(extras.length>0){
        const chips=extras.map(e=>{
          const cls=e.dead?'ep':'ap';
          return `<span class="${cls}">${e.t} (${e.c}): ${e.n.join(', ')}</span>`;
        }).join('');
        extraHtml=`<div class="gm-ex"><span class="el">${extras.some(e=>e.dead)?'Other / eliminated:':'Also picked:'}</span>${chips}</div>`;
      }

      html+=`<div class="gm${isResolved?' dim':''}">
        <div class="gs">
          <div class="tn"><span class="sd">${ls} </span>${lt}</div>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;color:var(--em)">${Math.round(lc/T*100)}%</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t4)">${lc}/${T} picked</span>
          </div>
          <div class="st2">
            <span><span class="sl">Odds </span><span class="sv2" style="color:var(--sk)">${lp}%</span></span>
          </div>
          <div class="pk">${lpk}</div>
        </div>
        <div class="gm-m">
          <div class="rd">${region}</div>
          <div class="vs">vs</div>
          ${isResolved?`<div class="fin">✓ ${g.win}</div>`:`<div style="font-family:'JetBrains Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.5px;color:var(--t4)">Controversy</div><div class="cs" style="background:${cBg};color:${cCol}">${cScore}</div>`}
        </div>
        <div class="gs r">
          <div class="tn">${rt}<span class="sd"> ${rs}</span></div>
          <div style="display:flex;align-items:baseline;gap:6px;justify-content:flex-end">
            <span style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;color:var(--em)">${Math.round(rc/T*100)}%</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t4)">${rc}/${T} picked</span>
          </div>
          <div class="st2">
            <span><span class="sl">Odds </span><span class="sv2" style="color:var(--sk)">${rp}%</span></span>
          </div>
          <div class="pk">${rpk}</div>
        </div>
        ${extraHtml}
      </div>`;
    });

    html+=`</div>`;
    el.innerHTML+=html;
  });
}
renderRounds();

// Live updates via serverless proxy — avoids CORS
async function liveUpdate(){
  try{
    const r=await fetch('/api/scores');
    if(!r.ok)return;
    const d=await r.json();
    let changed=false;

    // Update resolved S16 games
    if(d.resolved){
      d.resolved.forEach(g=>{
        const idx=g.sortOrder-1;
        if(idx>=0&&idx<S16.length&&g.settled&&g.winner&&S16[idx][5]==='pending'){
          S16[idx][5]='resolved';
          S16[idx][6]=g.winner;
          changed=true;
        }
      });
    }

    // Update entry scores
    if(d.entries&&d.entries.length>0){
      d.entries.forEach(e=>{
        const b=B.find(x=>x.n===e.name);
        if(b&&e.score!=null){
          b.s=e.score;
          if(e.percentile!=null)b.p=e.percentile;
          if(e.wins!=null){b.w=e.wins;b.l=e.losses||0}
          changed=true;
        }
      });
    }

    if(changed){
      B.sort((a,b)=>b.s-a.s);
      renderLeaderboard();
      renderChampCards();
      renderRounds();
      document.getElementById('live-badge').textContent='Live — '+new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    }
    document.getElementById('update-ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  }catch(e){
    document.getElementById('update-ts').textContent='Offline — '+new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  }
}
setInterval(liveUpdate,60000);
setTimeout(liveUpdate,3000);
</script>
