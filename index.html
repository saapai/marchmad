<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigmaEtaMadness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0a0e;--s1:#111116;--s2:#18181f;--s3:#1f1f28;--s4:#2a2a34;
      --t0:#ededf0;--t1:#c8c8d0;--t2:#8e8e9a;--t3:#5c5c6a;--t4:#3e3e4a;
      --bd:rgba(255,255,255,.07);--bds:rgba(255,255,255,.10);
      --em:#34d399;--emd:rgba(52,211,153,.08);
      --ro:#fb7185;--rod:rgba(251,113,133,.08);
      --sk:#7dd3fc;--skd:rgba(125,211,252,.08);
      --vi:#c4b5fd;--vid:rgba(196,181,253,.08);
      --am:#fbbf24;--amd:rgba(251,191,36,.08);
      --or:#fb923c;--ord:rgba(251,146,60,.08);
      --r:10px;
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
    .mono{font-family:'JetBrains Mono',monospace}
    .c{max-width:1080px;margin:0 auto;padding:0 24px}
    .tn{font-variant-numeric:tabular-nums}

    /* Header */
    .hd{padding:48px 0 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .hd h1{font-size:24px;font-weight:800;color:var(--t0);letter-spacing:-.4px}
    .hd .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);margin-top:3px}
    .live{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--em);padding:5px 14px;border-radius:20px;background:var(--emd);border:1px solid rgba(52,211,153,.12)}
    .live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--em);animation:p 2s ease-in-out infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

    /* Sections */
    .sec{margin:40px 0}
    .sh{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
    .st{font-size:15px;font-weight:700;color:var(--t0);letter-spacing:-.2px}
    .tg{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}

    /* Table */
    .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tb-wrap{background:var(--s1);border-radius:var(--r);border:1px solid var(--bd)}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:920px;font-variant-numeric:tabular-nums}
    th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t4);padding:11px 10px;text-align:left;border-bottom:1px solid var(--bds);background:var(--s1);position:sticky;top:0;z-index:1;cursor:default}
    th:first-child{border-radius:var(--r) 0 0 0}th:last-child{border-radius:0 var(--r) 0 0}
    th[data-tip]{position:relative}
    th[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);top:calc(100% + 8px);background:var(--s3);color:var(--t0);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;white-space:nowrap;padding:8px 14px;border-radius:8px;border:1px solid var(--s4);pointer-events:none;z-index:20}
    th.r,td.r{text-align:right}th.c,td.c{text-align:center}
    td{padding:9px 10px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle;transition:background .12s ease}
    tr:hover td{background:rgba(255,255,255,.02)}
    tr.g td{background:rgba(251,191,36,.03)}
    tr.sv td{background:rgba(192,192,192,.02)}
    tr.bz td{background:rgba(205,127,50,.02)}
    .rk{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--t3);width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px}
    .rk.g{color:#fbbf24;background:rgba(251,191,36,.1)}.rk.sv{color:#a8a8b0;background:rgba(168,168,176,.07)}.rk.bz{color:#cd7f32;background:rgba(205,127,50,.07)}
    .rd-wrap{display:inline-flex;align-items:center;gap:4px}
    .rk-delta{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600}
    .cb{display:inline-flex;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;white-space:nowrap}
    .nm{font-weight:600;color:var(--t0);font-size:13px}
    .ow{font-size:10px;color:var(--t4);margin-top:1px}
    .pt{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--t0)}
    .pc{font-family:'JetBrains Mono',monospace;font-size:11px}
    .rc{font-family:'JetBrains Mono',monospace;font-size:11px}.rc .w{color:var(--em)}.rc .l{color:var(--ro)}
    .rp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}
    .pj{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
    .mx{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4)}

    /* Champ cards */
    .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
    .cc{padding:14px 16px;border-radius:var(--r);background:var(--s1);border:1px solid var(--bd);display:flex;flex-direction:column;gap:6px;transition:border-color .2s ease}
    .cc:hover{border-color:rgba(255,255,255,.12)}
    .cc .ct{font-weight:700;font-size:15px;color:var(--t0)}
    .cc .odds{display:flex;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);flex-wrap:wrap}
    .cc .odds span{white-space:nowrap}
    .cc .bar{height:3px;border-radius:3px;background:var(--s3);overflow:hidden;margin:2px 0}
    .cc .bar-f{height:100%;border-radius:3px}
    .cc .names{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);line-height:1.6;margin-top:2px}

    /* Round sections */
    .rnd{margin-top:40px}
    .rnd-h{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
    .rnd-t{font-size:15px;font-weight:700;color:var(--t0);letter-spacing:-.2px}
    .rnd-pts{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:3px 8px;border-radius:4px;background:var(--s2)}

    /* Matchup card */
    .gm{display:grid;grid-template-columns:1fr 90px 1fr;border-radius:var(--r);border:1px solid rgba(255,255,255,.15);background:var(--s1);margin-bottom:28px;overflow:hidden;transition:border-color .15s ease}
    .gm:hover{border-color:rgba(255,255,255,.25)}
    .gm.dim{opacity:.35}
    .gs{padding:16px 18px;display:flex;flex-direction:column;gap:6px}
    .gs.r{text-align:right;align-items:flex-end}
    .gm-m{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--s2);border-left:1px solid var(--bd);border-right:1px solid var(--bd);gap:4px;padding:12px 8px;text-align:center}
    .gm-m .rd{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);font-weight:500}
    .gm-m .vs{font-weight:700;font-size:10px;color:var(--t4);opacity:.5}
    .gm-m .cs{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 10px;border-radius:6px;min-width:38px}
    .gm-m .fin{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;background:var(--emd);color:var(--em)}
    .gm .team{font-weight:700;font-size:16px;color:var(--t0);line-height:1.2}
    .gm .seed{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);font-weight:400}
    .gm .pct{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
    .gm .pct-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t4)}
    .gm .odds-line{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)}
    .gm .odds-val{color:var(--t2);font-weight:500}
    .gm .picks{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);line-height:1.5;margin-top:2px}
    .gm .picks .more{color:var(--t4)}
    .gm-ex{grid-column:1/-1;padding:8px 18px;background:var(--s2);border-top:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);line-height:1.5}
    .gm-ex .dead{color:var(--ro);opacity:.6;text-decoration:line-through}
    .gm-ex .alive{color:var(--t3)}

    /* Bracket progression */
    .bp{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:border-color .15s ease}
    .bp:hover{border-color:rgba(255,255,255,.12)}
    .bp-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
    .bp-h .bp-nm{font-weight:600;font-size:13px;color:var(--t0)}
    .bp-h .bp-sc{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--t0)}
    .bp-h .bp-ch{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-left:8px}
    .bp-h .bp-toggle{color:var(--t4);font-size:10px;transition:transform .15s ease}
    .bp-b{display:none;padding:0 16px 14px}
    .bp.open .bp-b{display:block}
    .bp.open .bp-toggle{transform:rotate(180deg)}
    .bp-rd{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    .bp-rd-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--t4);font-weight:600;min-width:28px;padding-top:3px}
    .bp-pk{display:inline-flex;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;margin:1px 0}
    .bp-pk.correct{background:var(--emd);color:var(--em)}
    .bp-pk.wrong{background:var(--rod);color:var(--ro);text-decoration:line-through;opacity:.6}
    .bp-pk.alive{background:var(--s2);color:var(--t2)}
    .bp-pk.dead{background:var(--rod);color:var(--ro);opacity:.4}

    /* Footer */
    footer{padding:24px 0;border-top:1px solid var(--bd);margin-top:36px}
    footer p{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4)}

    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}

    @media(max-width:700px){
      .c{padding:0 16px}
      .hd{padding:32px 0 24px}
      .hd h1{font-size:20px}
      .gm{grid-template-columns:1fr;margin-bottom:32px;border:1px solid rgba(255,255,255,.22)}
      .gm-m{flex-direction:row;border-left:none;border-right:none;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:8px 16px;gap:12px}
      .gs{padding:14px 16px}
      .gs.r{text-align:left;align-items:flex-start}
      .cg{grid-template-columns:repeat(2,1fr);gap:8px}
      .sec{margin:32px 0}
      .bp-pk{font-size:9px;padding:2px 5px}
      .bp-rd-label{font-size:8px;min-width:22px}
    }
  </style>
</head>

const PS={Duke:.73,"St. John's":.27,UConn:.55,"Michigan St":.45,Houston:.58,Illinois:.42,Arizona:.80,Arkansas:.20,Purdue:.74,Texas:.26,Michigan:.80,Alabama:.20,"Iowa State":.65,Tennessee:.35};
const PE={Duke:.52,"St. John's":.16,"Michigan St":.16,UConn:.16,Houston:.41,Illinois:.28,Nebraska:.20,Iowa:.11,Arizona:.58,Purdue:.30,Arkansas:.09,Texas:.04,Michigan:.56,"Iowa State":.27,Tennessee:.12,Alabama:.06};
const PF={Duke:.33,Houston:.20,Illinois:.10,Michigan:.35,Arizona:.32,Purdue:.12,"Iowa State":.10,UConn:.05,"Michigan St":.05,"St. John's":.05,Arkansas:.03,Tennessee:.02,Nebraska:.02,Iowa:.01,Alabama:.01,Texas:.005};
const PC={Duke:.18,Michigan:.21,Arizona:.215,Houston:.11,Purdue:.056,Illinois:.061,"Iowa State":.053,UConn:.033,"Michigan St":.028,"St. John's":.026,Arkansas:.021,Tennessee:.015,Nebraska:.013,Iowa:.01,Alabama:.01,Texas:.005};
const MK={Duke:{p:18,k:20,b:"+420"},Michigan:{p:21,k:18,b:"+300"},Arizona:{p:21.5,k:18.5,b:"+330"},Houston:{p:11,k:7,b:"+750"},"Iowa State":{p:5.3,k:4.5,b:"+1700"},Purdue:{p:5.6,k:5,b:"+1500"}};

function cbg(t){return{Duke:"rgba(0,48,135,.12)",Michigan:"rgba(255,203,5,.07)",Arizona:"rgba(204,0,51,.08)",Houston:"rgba(200,16,46,.08)","Iowa State":"rgba(200,16,46,.08)",Purdue:"rgba(206,184,136,.07)"}[t]||"var(--s3)"}
function cfg(t){return{Duke:"#93b4f7",Michigan:"#fcd34d",Arizona:"#fb7185",Houston:"#fb7185","Iowa State":"#fb7185",Purdue:"#e2d5b8"}[t]||"var(--t2)"}

function proj(b){
  let e=b.s;
  b.s16.forEach((pk,i)=>{if(S16[i][5]!=="resolved")e+=40*(PS[pk]||0)});
  b.e8.forEach(pk=>{e+=80*(AL.has(pk)?PE[pk]||0:0)});
  b.ff.forEach(pk=>{e+=160*(AL.has(pk)?PF[pk]||0:0)});
  e+=320*(AL.has(b.ch)?PC[b.ch]||0:0);
  return Math.round(e);
}

function bold(b){
  let s=0,w=0;
  b.s16.forEach((pk,i)=>{const c=B.filter(x=>x.s16[i]===pk).length;s+=(1-c/T);w++});
  b.e8.forEach((pk,i)=>{const c=B.filter(x=>x.e8[i]===pk).length;s+=(1-c/T)*2;w+=2});
  b.ff.forEach((pk,i)=>{const c=B.filter(x=>x.ff[i]===pk).length;s+=(1-c/T)*4;w+=4});
  const cc=B.filter(x=>x.ch===b.ch).length;s+=(1-cc/T)*8;w+=8;
  return Math.round(s/w*100);
}

// Rank tracking — store daily rankings in localStorage
function getTodayKey(){return 'ranks_'+new Date().toISOString().slice(0,10)}
function getYesterdayKey(){const d=new Date();d.setDate(d.getDate()-1);return 'ranks_'+d.toISOString().slice(0,10)}
function loadPrevRanks(){
  try{const d=localStorage.getItem(getYesterdayKey());return d?JSON.parse(d):null}catch(e){return null}
}
function saveRanks(ranks){
  try{localStorage.setItem(getTodayKey(),JSON.stringify(ranks))}catch(e){}
}

// Leaderboard
function renderLeaderboard(){
  const el=document.getElementById('lb');el.innerHTML='';let rk=0,pv=-1;
  const prevRanks=loadPrevRanks();
  const curRanks={};
  // First pass: compute current ranks
  B.forEach((b,i)=>{
    if(b.s!==pv){rk=i+1;pv=b.s}
    curRanks[b.n]=rk;
  });
  saveRanks(curRanks);
  rk=0;pv=-1;
  B.forEach((b,i)=>{
    if(b.s!==pv){rk=i+1;pv=b.s}
    const pj=proj(b);const bd=bold(b);
    const mc=rk===1?'g':rk===2?'sv':rk<=3?'bz':'';
    const rc=rk===1?'g':rk===2?'sv':rk<=3?'bz':'';
    const pcc=b.p>=90?'var(--em)':b.p>=70?'var(--t0)':b.p>=50?'var(--t2)':'var(--t3)';
    const pjc=pj>=780?'var(--t0)':pj>=700?'var(--t1)':'var(--t2)';
    const bdc=bd>=50?'var(--or)':bd>=30?'var(--am)':'var(--t2)';
    // Rank change delta
    let deltaHtml='';
    if(prevRanks&&prevRanks[b.n]!=null){
      const diff=prevRanks[b.n]-rk; // positive = moved up
      if(diff>0)deltaHtml=`<span class="rk-delta" style="color:var(--em)">▲${diff}</span>`;
      else if(diff<0)deltaHtml=`<span class="rk-delta" style="color:var(--ro)">▼${Math.abs(diff)}</span>`;
    }
    el.innerHTML+=`<tr class="${rc}"><td class="c"><div class="rd-wrap"><span class="rk ${mc}">${rk}</span>${deltaHtml}</div></td>
      <td><span class="cb" style="background:${cbg(b.ch)};color:${cfg(b.ch)}">(${b.cs}) ${b.ch}</span></td>
      <td><div class="nm">${b.n}</div><div class="ow">${b.o}</div></td>
      <td class="r"><span class="pt">${b.s}</span></td>
      <td class="r"><span class="pc" style="color:${pcc}">${b.p.toFixed(1)}</span></td>
      <td class="r"><span class="pj" style="color:${pjc}">${pj}</span></td>
      <td class="r"><span class="mx">${b.mx}</span></td>
      <td class="r"><span class="rc"><span class="w">${b.w}W</span><span style="color:var(--t4)">-</span><span class="l">${b.l}L</span></span></td>
      <td class="r"><span class="rp">${b.r64}</span></td>
      <td class="r"><span class="rp">${b.r32}</span></td>
      <td class="r"><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:${bdc}">${bd}</span></td></tr>`;
  });
}
renderLeaderboard();

// Champion cards
function renderChampCards(){
  const el=document.getElementById('cg');el.innerHTML='';
  const ct={};B.forEach(b=>{if(!ct[b.ch])ct[b.ch]={count:0,names:[]};ct[b.ch].count++;ct[b.ch].names.push(b.n)});
  const sorted=Object.entries(ct).sort((a,b)=>b[1].count-a[1].count);
  const mx=sorted[0][1].count;
  sorted.forEach(([team,d])=>{
    const pct=Math.round(d.count/T*100);
    const m=MK[team];const pp=m?m.p:0,kp=m?m.k:0;
    const nameStr=d.names.join(', ');
    el.innerHTML+=`<div class="cc">
      <div style="display:flex;justify-content:space-between;align-items:baseline"><span class="ct">${team}</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)">${d.count}/${T}</span></div>
      <div class="bar"><div class="bar-f" style="width:${d.count/mx*100}%;background:var(--t2)"></div></div>
      <div style="margin:2px 0"><span style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:var(--t0)">${pct}%</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);margin-left:4px">pool</span></div>
      <div class="odds">
        <span style="color:var(--vi)">Poly ${pp}%</span>
        <span style="color:var(--sk)">Kalshi ${kp}%</span>
        ${m?`<span style="color:var(--t4)">${m.b}</span>`:''}
      </div>
      <div class="names">${nameStr}</div>
    </div>`;
  });
}
renderChampCards();

// Helper: format name list with +N overflow
function fmtNames(names,max){
  if(names.length<=max)return names.join(', ');
  return names.slice(0,max).join(', ')+` <span class="more">+${names.length-max}</span>`;
}

// Confirmed matchup tracking for future rounds
// E8 pairs: games 0+1 feed E8[0], 2+3 feed E8[1], 4+5 feed E8[2], 6+7 feed E8[3]
// FF pairs: E8[0]+E8[1] feed FF[0], E8[2]+E8[3] feed FF[1]
// CH: FF[0]+FF[1] feed CH
const E8G=[[null,null],[null,null],[null,null],[null,null]]; // confirmed E8 matchups
const FFG=[[null,null],[null,null]]; // confirmed FF matchups
const CHG=[[null,null]]; // confirmed Championship matchup

function updateConfirmed(){
  // E8: each pair of S16 games feeds one E8 game
  for(let i=0;i<4;i++){
    const g1=S16[i*2],g2=S16[i*2+1];
    E8G[i][0]=g1[5]==='resolved'?g1[6]:null;
    E8G[i][1]=g2[5]==='resolved'?g2[6]:null;
  }
  // FF: each pair of E8 games feeds one FF game
  // FF is only confirmed if both E8 games in that pair are fully resolved (both teams known)
  // But E8 games themselves need to resolve, not just be "known"
  // For now, E8 is "confirmed" when both teams are known. E8 resolution would come from API.
  // We'll track E8 resolution separately
  // For E8 resolution: we'll use a parallel tracking
}
updateConfirmed();

// Games grouped by round — only show confirmed matchups
function renderRounds(){
  const el=document.getElementById('rounds');el.innerHTML='';
  updateConfirmed();

  function gatherS16(){
    const games=[];
    S16.forEach((m,i)=>{
      const slot={t1:m[0],s1:m[1],t2:m[2],s2:m[3],p1:m[4],p2:100-m[4],st:m[5],win:m[6],reg:S16R[i]};
      const picks={},dead={};
      B.forEach(b=>{
        const pk=b.s16[i];
        if(AL.has(pk)){if(!picks[pk])picks[pk]={c:0,n:[]};picks[pk].c++;picks[pk].n.push(b.n)}
        else{if(!dead[pk])dead[pk]={c:0,n:[]};dead[pk].c++;dead[pk].n.push(b.n)}
      });
      const liveTotal=Object.values(picks).reduce((s,v)=>s+v.c,0);
      const topC=Math.max(...Object.values(picks).map(v=>v.c),0);
      const minority=liveTotal-topC;
      const ctrv=Math.min(100,Math.round(minority/(T/2)*100));
      games.push({i,picks,dead,ctrv,...slot});
    });
    games.sort((a,b)=>b.ctrv-a.ctrv);
    return games;
  }

  function gatherConfirmed(type,confirmed,labels,pickKey){
    const games=[];
    confirmed.forEach((pair,i)=>{
      if(!pair[0]||!pair[1])return; // skip if not yet confirmed
      const t1=pair[0],t2=pair[1];
      const picks={},dead={};
      B.forEach(b=>{
        const pk=type==='e8'?b.e8[i]:type==='ff'?b.ff[i]:b.ch;
        if(AL.has(pk)){if(!picks[pk])picks[pk]={c:0,n:[]};picks[pk].c++;picks[pk].n.push(b.n)}
        else{if(!dead[pk])dead[pk]={c:0,n:[]};dead[pk].c++;dead[pk].n.push(b.n)}
      });
      const liveTotal=Object.values(picks).reduce((s,v)=>s+v.c,0);
      const topC=Math.max(...Object.values(picks).map(v=>v.c),0);
      const minority=liveTotal-topC;
      const ctrv=Math.min(100,Math.round(minority/(T/2)*100));
      games.push({i,picks,dead,ctrv,t1,t2,label:labels[i],st:'pending'});
    });
    games.sort((a,b)=>b.ctrv-a.ctrv);
    return games;
  }

  const probMap={s16:PS,e8:PE,ff:PF,ch:PC};

  // Always show S16
  const rounds=[{name:"Sweet 16",pts:40,games:gatherS16(),type:'s16'}];

  // E8: only if at least one E8 game has both teams confirmed
  const e8Games=gatherConfirmed('e8',E8G,E8L);
  if(e8Games.length>0)rounds.push({name:"Elite 8",pts:80,games:e8Games,type:'e8'});

  // FF: only if at least one FF game confirmed
  const ffGames=gatherConfirmed('ff',FFG,FFL);
  if(ffGames.length>0)rounds.push({name:"Final Four",pts:160,games:ffGames,type:'ff'});

  // Championship
  const chGames=gatherConfirmed('ch',CHG,["Championship"]);
  if(chGames.length>0)rounds.push({name:"Championship",pts:320,games:chGames,type:'ch'});

  rounds.forEach(round=>{
    let html=`<div class="rnd"><div class="rnd-h"><span class="rnd-t">${round.name}</span><span class="rnd-pts">${round.pts} pts per correct pick</span></div>`;

    round.games.forEach(g=>{
      const sorted=Object.entries(g.picks).sort((a,b)=>b[1].c-a[1].c);
      const deadSorted=Object.entries(g.dead).sort((a,b)=>b[1].c-a[1].c);
      const isResolved=g.st==='resolved';

      let lt,rt,ls,rs,lp,rp,lc,rc,ln,rn;
      if(round.type==='s16'){
        lt=g.t1;rt=g.t2;ls=`(${g.s1})`;rs=`(${g.s2})`;lp=g.p1;rp=g.p2;
        lc=g.picks[g.t1]?g.picks[g.t1].c:0;rc=g.picks[g.t2]?g.picks[g.t2].c:0;
        ln=g.picks[g.t1]?g.picks[g.t1].n:[];rn=g.picks[g.t2]?g.picks[g.t2].n:[];
      } else {
        // For confirmed future-round games, we know the two teams
        lt=g.t1;rt=g.t2;
        lc=g.picks[g.t1]?g.picks[g.t1].c:0;rc=g.picks[g.t2]?g.picks[g.t2].c:0;
        ln=g.picks[g.t1]?g.picks[g.t1].n:[];rn=g.picks[g.t2]?g.picks[g.t2].n:[];
        ls='';rs='';
        const pm=probMap[round.type];
        const p1=pm[lt]||0,p2=pm[rt]||0,tot=p1+p2||1;
        lp=Math.round(p1/tot*100);rp=Math.round(p2/tot*100);
      }

      const cScore=g.ctrv;
      const cCol=cScore>=50?'var(--or)':cScore>=30?'var(--am)':'var(--t3)';
      const cBg=cScore>=50?'var(--ord)':cScore>=30?'var(--amd)':'var(--s3)';
      const region=g.reg||g.label||'';

      const lPct=Math.round(lc/T*100),rPct=Math.round(rc/T*100);
      const lCol=lc>rc?'var(--em)':lc===rc?'var(--em)':'var(--t3)';
      const rCol=rc>lc?'var(--em)':rc===lc?'var(--em)':'var(--t3)';

      const lNames=fmtNames(ln,6);
      const rNames=fmtNames(rn,6);

      let extraHtml='';
      const extras=[...sorted.slice(2).map(([t,d])=>({t,c:d.c,n:d.n,dead:false})),...deadSorted.map(([t,d])=>({t,c:d.c,n:d.n,dead:true}))];
      if(extras.length>0){
        const parts=extras.map(e=>{
          const cls=e.dead?'dead':'alive';
          const names=e.n.length<=3?e.n.join(', '):e.n.slice(0,3).join(', ')+` +${e.n.length-3}`;
          return `<span class="${cls}">${e.t} (${e.c}): ${names}</span>`;
        }).join(' &middot; ');
        const label=extras.some(e=>e.dead)?'Other:':'Also:';
        extraHtml=`<div class="gm-ex"><span style="margin-right:4px">${label}</span>${parts}</div>`;
      }

      html+=`<div class="gm${isResolved?' dim':''}">
        <div class="gs">
          <div class="team"><span class="seed">${ls} </span>${lt}</div>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span class="pct" style="color:${lCol}">${lPct}%</span>
            <span class="pct-sub">${lc}/${T} picked</span>
          </div>
          <div class="odds-line">${lp}% <span class="odds-val">odds</span></div>
          <div class="picks">${lNames}</div>
        </div>
        <div class="gm-m">
          <div class="rd">${region}</div>
          <div class="vs">vs</div>
          ${isResolved?`<div class="fin">✓ ${g.win}</div>`:`<div class="cs" style="background:${cBg};color:${cCol}">${cScore}</div>`}
        </div>
        <div class="gs r">
          <div class="team">${rt}<span class="seed"> ${rs}</span></div>
          <div style="display:flex;align-items:baseline;gap:6px;justify-content:flex-end">
            <span class="pct" style="color:${rCol}">${rPct}%</span>
            <span class="pct-sub">${rc}/${T} picked</span>
          </div>
          <div class="odds-line">${rp}% <span class="odds-val">odds</span></div>
          <div class="picks">${rNames}</div>
        </div>
        ${extraHtml}
      </div>`;
    });

    html+=`</div>`;
    el.innerHTML+=html;
  });
}
renderRounds();

// Bracket progression — collapsible per-entry view
function pickStatus(team,roundType,idx){
  // Determine if a pick is correct, wrong, alive, or dead
  if(roundType==='s16'){
    const g=S16[idx];
    if(g[5]==='resolved') return g[6]===team?'correct':'wrong';
    return AL.has(team)?'alive':'dead';
  }
  // For E8/FF/Ch: pick is "dead" if team is eliminated, "alive" if still in
  if(!AL.has(team))return 'dead';
  return 'alive';
}

function renderBrackets(){
  const el=document.getElementById('brackets');el.innerHTML='';
  const regions=['East','East','South','South','West','West','Midwest','Midwest'];
  B.forEach(b=>{
    const rows=[];
    // S16 row
    const s16Pills=b.s16.map((pk,i)=>{
      const st=pickStatus(pk,'s16',i);
      return `<span class="bp-pk ${st}">${pk}</span>`;
    }).join(' ');
    rows.push(`<div class="bp-rd"><span class="bp-rd-label">S16</span>${s16Pills}</div>`);
    // E8 row
    const e8Pills=b.e8.map((pk,i)=>{
      const st=pickStatus(pk,'e8',i);
      return `<span class="bp-pk ${st}">${pk}</span>`;
    }).join(' ');
    rows.push(`<div class="bp-rd"><span class="bp-rd-label">E8</span>${e8Pills}</div>`);
    // FF row
    const ffPills=b.ff.map((pk,i)=>{
      const st=pickStatus(pk,'ff',i);
      return `<span class="bp-pk ${st}">${pk}</span>`;
    }).join(' ');
    rows.push(`<div class="bp-rd"><span class="bp-rd-label">FF</span>${ffPills}</div>`);
    // Champion
    const chSt=pickStatus(b.ch,'ch',0);
    rows.push(`<div class="bp-rd"><span class="bp-rd-label">CH</span><span class="bp-pk ${chSt}">${b.ch}</span></div>`);

    el.innerHTML+=`<div class="bp" onclick="this.classList.toggle('open')">
      <div class="bp-h">
        <div><span class="bp-nm">${b.n}</span><span class="bp-ch">${b.ch} champ</span></div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="bp-sc">${b.s} pts</span>
          <span class="bp-toggle">▼</span>
        </div>
      </div>
      <div class="bp-b">${rows.join('')}</div>
    </div>`;
  });
}
renderBrackets();

// Live updates via serverless proxy
async function liveUpdate(){
  try{
    const r=await fetch('/api/scores');
    if(!r.ok)return;
    const d=await r.json();
    let changed=false;

    if(d.resolved){
      d.resolved.forEach(g=>{
        // S16 resolution (period 3)
        if(g.period===3){
          const idx=g.sortOrder-1;
          if(idx>=0&&idx<S16.length&&g.settled&&g.winner&&S16[idx][5]==='pending'){
            S16[idx][5]='resolved';
            S16[idx][6]=g.winner;
            const loser=S16[idx][0]===g.winner?S16[idx][2]:S16[idx][0];
            AL.delete(loser);
            changed=true;
          }
        }
        // E8 resolution (period 4) — mark winners, eliminate losers
        if(g.period===4&&g.settled&&g.winner){
          const idx=g.sortOrder-1;
          if(idx>=0&&idx<E8G.length&&E8G[idx][0]&&E8G[idx][1]){
            const loser=E8G[idx][0]===g.winner?E8G[idx][1]:E8G[idx][0];
            AL.delete(loser);
            // Feed FF matchups
            const ffIdx=Math.floor(idx/2);
            const ffSlot=idx%2;
            FFG[ffIdx][ffSlot]=g.winner;
            changed=true;
          }
        }
        // FF resolution (period 5)
        if(g.period===5&&g.settled&&g.winner){
          const idx=g.sortOrder-1;
          if(idx>=0&&idx<FFG.length&&FFG[idx][0]&&FFG[idx][1]){
            const loser=FFG[idx][0]===g.winner?FFG[idx][1]:FFG[idx][0];
            AL.delete(loser);
            CHG[0][idx]=g.winner;
            changed=true;
          }
        }
        // Championship resolution (period 6)
        if(g.period===6&&g.settled&&g.winner){
          if(CHG[0][0]&&CHG[0][1]){
            const loser=CHG[0][0]===g.winner?CHG[0][1]:CHG[0][0];
            AL.delete(loser);
            changed=true;
          }
        }
      });
    }

    if(d.entries&&d.entries.length>0){
      d.entries.forEach(e=>{
        const b=B.find(x=>x.n===e.name);
        if(b&&e.score!=null){
          b.s=e.score;
          if(e.percentile!=null)b.p=e.percentile;
          if(e.wins!=null){b.w=e.wins;b.l=e.losses||0}
          changed=true;
        }
      });
    }

    if(changed){
      B.sort((a,b)=>b.s-a.s);
      renderLeaderboard();
      renderChampCards();
      renderRounds();
      renderBrackets();
      document.getElementById('live-badge').textContent='Live \u2014 '+new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    }
    document.getElementById('update-ts').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  }catch(e){
    document.getElementById('update-ts').textContent='Offline \u2014 '+new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  }
}
setInterval(liveUpdate,60000);
setTimeout(liveUpdate,3000);
</script>
