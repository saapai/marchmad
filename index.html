    .section-title { font-size:17px; font-weight:700; color:var(--text-0); }

    }

    /* Card */
    .card { background:var(--bg-1); border-radius:10px; border:1px solid var(--border); }

    .tw { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .tb { width:100%; border-collapse:collapse; min-width:900px; }
    .tb th {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600;
      text-transform:uppercase; letter-spacing:.8px; color:var(--text-4);
      padding:11px 12px; text-align:left;
      border-bottom:1px solid var(--border-s);
      position:sticky; top:0; background:var(--bg-1); z-index:1;
    }
    .tb th.r, .tb td.r { text-align:right; }
    .tb th.c, .tb td.c { text-align:center; }
    .tb td {
      padding:9px 12px; border-bottom:1px solid var(--border);
      font-size:13px; vertical-align:middle;
    }
    .tb tr:hover td { background:rgba(255,255,255,0.015); }
    .tb tr.top td { background:rgba(252,211,77,0.03); }

    .rk { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; color:var(--text-3); }
    .rk.gold { color:#fcd34d; }
    .rk.silver { color:#c0c0c0; }
    .rk.bronze { color:#cd7f32; }
    .tb tr.rank-1 td { background:rgba(252,211,77,0.04); }
    .tb tr.rank-2 td { background:rgba(192,192,192,0.03); }
    .tb tr.rank-3 td { background:rgba(205,127,50,0.03); }
    .ch-badge {
      display:inline-flex; align-items:center; padding:3px 8px; border-radius:5px;
      font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; white-space:nowrap;
    }
    .nm { font-weight:600; color:var(--text-0); }
    .ow { font-size:11px; color:var(--text-4); margin-top:1px; }
    .pts { font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:var(--text-0); }
    .pct { font-family:'JetBrains Mono',monospace; font-size:12px; }
    .rec { font-family:'JetBrains Mono',monospace; font-size:12px; }
    .rec .w { color:var(--emerald); }
    .rec .l { color:var(--rose); }
    .rpts { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-2); }

    .cg { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:8px; }
    .cc {
      padding:13px; border-radius:8px; background:var(--bg-2);
      border:1px solid var(--border); display:flex; flex-direction:column; gap:7px;

    .cc .br { display:flex; align-items:center; gap:6px; }

    .cc .bp { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; width:36px; flex-shrink:0; }

    .mc {

      border-radius:10px; overflow:hidden; border:1px solid var(--border);
      background:var(--bg-1);

    .mc-side {
      padding:16px 18px; display:flex; flex-direction:column; gap:6px;

    .mc-mid {

    .mc-score {

    .mc-seed {

    .mc-stat-label { color:var(--text-4); }

    .mc-pickers {

    .mc-picker {

    .mc-dead-section {

      font-family:'JetBrains Mono',monospace; font-size:10px;
      padding:2px 6px; border-radius:3px;

    .mc-splitbar {
      grid-column:1/-1; padding:0 18px 12px;
      background:var(--bg-1);
    }
    .mc-sb {

      .mc-mid { flex-direction:row; border-left:none; border-right:none; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
      .mc-side.right { text-align:left; }
      .mc-side.right .mc-stats { justify-content:flex-start; }
      .mc-side.right .mc-pickers { justify-content:flex-start; }
      .cg { grid-template-columns:repeat(2,1fr); }
    }
  </style>

function champBg(t){return{"Duke":"rgba(0,48,135,.18)","Michigan":"rgba(255,203,5,.10)","Arizona":"rgba(204,0,51,.12)",
  "Houston":"rgba(200,16,46,.12)","Iowa State":"rgba(200,16,46,.12)","Purdue":"rgba(206,184,136,.10)"}[t]||"var(--bg-3)";}
function champFg(t){return{"Duke":"#93b4f7","Michigan":"#fcd34d","Arizona":"#fb7185",
  "Houston":"#fb7185","Iowa State":"#fb7185","Purdue":"#e2d5b8"}[t]||"var(--text-2)";}

// ============================================================
// PROJECTED POINTS
// ============================================================
function calcProj(b) {
  let exp = b.s;
  // S16: 40pts each, 8 slots
  b.s16.forEach((pick,i) => {
    if(S16[i][5]==="resolved") return; // already scored
    const p = P_S16[pick] || 0;
    exp += 40 * p;
  });
  // E8: 80pts each, 4 slots
  b.e8.forEach(pick => {
    const p = alive.has(pick) ? (P_E8[pick]||0) : 0;
    exp += 80 * p;
  });
  // FF: 160pts each, 2 slots
  b.ff.forEach(pick => {
    const p = alive.has(pick) ? (P_FF[pick]||0) : 0;
    exp += 160 * p;
  });
  // Championship: 320pts
  const cp = alive.has(b.ch) ? (P_CH[b.ch]||0) : 0;
  exp += 320 * cp;
  return Math.round(exp);
}

// ============================================================
// RENDER: LEADERBOARD
// ============================================================
function renderLB() {
  const body = document.getElementById('lb-body');
  let rank=0, prev=-1;
  B.forEach((b,i) => {
    if(b.s!==prev){rank=i+1;prev=b.s;}
    const proj = calcProj(b);
    const pctC = b.p>=90?'var(--emerald)':b.p>=70?'var(--text-1)':b.p>=50?'var(--text-2)':'var(--text-3)';
    const projC = proj>=780?'var(--emerald)':proj>=700?'var(--sky)':'var(--text-2)';
    const medalCls = rank===1?'gold':rank===2?'silver':rank<=3?'bronze':'';
    const rowCls = rank<=3?`rank-${rank}`:'';
    body.innerHTML += `<tr class="${rowCls}">
      <td class="c"><span class="rk ${medalCls}">${rank}</span></td>
      <td><span class="ch-badge" style="background:${champBg(b.ch)};color:${champFg(b.ch)};">(${b.cs}) ${b.ch}</span></td>
      <td><div class="nm">${b.n}</div><div class="ow">${b.o}</div></td>
      <td class="r"><span class="pts">${b.s}</span></td>
      <td class="r"><span class="pct" style="color:${pctC};">${b.p.toFixed(1)}</span></td>
      <td class="r"><span class="proj" style="color:${projC};">${proj}</span></td>
      <td class="r"><span class="mx">${b.mx}</span>
        <div class="mbar"><div class="mbar-f" style="width:${(b.mx/1920*100).toFixed(0)}%;background:var(--text-4);"></div></div></td>
      <td class="r"><span class="rec"><span class="w">${b.w}W</span>-<span class="l">${b.l}L</span></span></td>
      <td class="r"><span class="rpts">${b.r64}</span></td>
      <td class="r"><span class="rpts">${b.r32}</span></td>
    </tr>`;
  });
}

// ============================================================
// RENDER: CHAMPIONSHIP GRID
// ============================================================
function renderChamp() {
  const grid = document.getElementById('champ-grid');
  const counts = {};
  B.forEach(b=>{counts[b.ch]=(counts[b.ch]||0)+1;});
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total=B.length, maxC=sorted[0][1];

  sorted.forEach(([team,count])=>{
    const pct=((count/total)*100).toFixed(0);
    const m=MKT[team];
    const pp=m?m.poly:0, kp=m?m.kalshi:0;
    grid.innerHTML+=`<div class="cc">
      <div class="tr"><span class="tn">${team}</span><span class="ts">${count}/${total}</span></div>
      <div class="br"><span class="bl">Pool</span><div class="cb"><div class="cb-f" style="width:${(count/maxC)*100}%;background:var(--emerald);"></div></div><span class="bp" style="color:var(--emerald);">${pct}%</span></div>
      <div class="br"><span class="bl">Poly</span><div class="cb"><div class="cb-f" style="width:${(pp/25)*100}%;background:var(--violet);"></div></div><span class="bp" style="color:var(--violet);">${pp}%</span></div>
      <div class="br"><span class="bl">Kalshi</span><div class="cb"><div class="cb-f" style="width:${(kp/25)*100}%;background:var(--sky);"></div></div><span class="bp" style="color:var(--sky);">${kp}%</span></div>
      ${m?`<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-4);">Book: ${m.book}</div>`:''}
    </div>`;
  });
}

// ============================================================
// RENDER: ALL MATCHUPS RANKED BY CONTROVERSY
// ============================================================
function buildGames() {
  const games = [];
  const total = B.length;

  // S16 games (8 slots)
  S16.forEach((m,mi) => {
    const picks = {};
    const deadPicks = {};
    B.forEach(b => {
      const pk = b.s16[mi];
      if(alive.has(pk)){
        if(!picks[pk]) picks[pk]={count:0,names:[]};
        picks[pk].count++; picks[pk].names.push(b.n);
      } else {
        if(!deadPicks[pk]) deadPicks[pk]={count:0,names:[]};
        deadPicks[pk].count++; deadPicks[pk].names.push(b.n);
      }
    });
    const topCount = Math.max(...Object.values(picks).map(v=>v.count),0);
    const controversy = topCount>0 ? Math.round((1 - topCount/total)*100) : 0;
    games.push({
      type:'s16', round:'Sweet 16', region:S16_REGIONS[mi], pts:40,
      t1:m[0], s1:m[1], t2:m[2], s2:m[3], prob1:m[4], prob2:100-m[4],
      status:m[5], winner:m[6],
      picks, deadPicks, controversy
    });
  });

  // E8 games (4 slots)
  E8_LABELS.forEach((label,i) => {
    const picks = {};
    const deadPicks = {};
    B.forEach(b => {
      const pk = b.e8[i];
      if(alive.has(pk)){
        if(!picks[pk]) picks[pk]={count:0,names:[]};
        picks[pk].count++; picks[pk].names.push(b.n);
      } else {
        if(!deadPicks[pk]) deadPicks[pk]={count:0,names:[]};
        deadPicks[pk].count++; deadPicks[pk].names.push(b.n);
      }
    });
    const topCount = Math.max(...Object.values(picks).map(v=>v.count),0);
    const controversy = topCount>0 ? Math.round((1 - topCount/total)*100) : 0;
    // Get top two alive picks for display
    const sorted = Object.entries(picks).sort((a,b)=>b[1].count-a[1].count);
    const t1=sorted[0]?sorted[0][0]:'TBD', t2=sorted[1]?sorted[1][0]:'TBD';
    const p1=P_E8[t1]||0, p2=P_E8[t2]||0;
    games.push({
      type:'e8', round:'Elite 8', region:label, pts:80,
      t1, s1:'', t2, s2:'', prob1:Math.round(p1*100/(p1+p2||1)), prob2:Math.round(p2*100/(p1+p2||1)),
      status:'pending',
      picks, deadPicks, controversy
    });
  });

  // FF games (2 slots)
  FF_LABELS.forEach((label,i) => {
    const picks = {};
    const deadPicks = {};
    B.forEach(b => {
      const pk = b.ff[i];
      if(alive.has(pk)){
        if(!picks[pk]) picks[pk]={count:0,names:[]};
        picks[pk].count++; picks[pk].names.push(b.n);
      } else {
        if(!deadPicks[pk]) deadPicks[pk]={count:0,names:[]};
        deadPicks[pk].count++; deadPicks[pk].names.push(b.n);
      }
    });
    const topCount = Math.max(...Object.values(picks).map(v=>v.count),0);
    const controversy = topCount>0 ? Math.round((1 - topCount/total)*100) : 0;
    const sorted = Object.entries(picks).sort((a,b)=>b[1].count-a[1].count);
    const t1=sorted[0]?sorted[0][0]:'TBD', t2=sorted[1]?sorted[1][0]:'TBD';
    const p1=P_FF[t1]||0, p2=P_FF[t2]||0;
    games.push({
      type:'ff', round:'Final Four', region:label, pts:160,
      t1, s1:'', t2, s2:'', prob1:Math.round(p1*100/(p1+p2||1)), prob2:Math.round(p2*100/(p1+p2||1)),
      status:'pending',
      picks, deadPicks, controversy
    });
  });

  // Championship
  {
    const picks = {};
    B.forEach(b => {
      const pk = b.ch;
      if(!picks[pk]) picks[pk]={count:0,names:[]};
      picks[pk].count++; picks[pk].names.push(b.n);
    });
    const topCount = Math.max(...Object.values(picks).map(v=>v.count));
    const controversy = Math.round((1 - topCount/total)*100);
    const sorted = Object.entries(picks).sort((a,b)=>b[1].count-a[1].count);
    const t1=sorted[0][0], t2=sorted[1][0];
    const p1=P_CH[t1]||0, p2=P_CH[t2]||0;
    games.push({
      type:'ch', round:'Championship', region:'National Champion', pts:320,
      t1, s1:'', t2, s2:'', prob1:Math.round(p1*100/(p1+p2||1)), prob2:Math.round(p2*100/(p1+p2||1)),
      status:'pending',
      picks, deadPicks:{}, controversy
    });
  }

  // Sort by weighted controversy (controversy × pts multiplier)
  games.sort((a,b) => (b.controversy * b.pts) - (a.controversy * a.pts));
  return games;
}

function renderMatchups() {
  const list = document.getElementById('mc-list');
  const games = buildGames();
  const total = B.length;

  games.forEach(g => {
    const isResolved = g.status === 'resolved';
    const sorted = Object.entries(g.picks).sort((a,b)=>b[1].count-a[1].count);
    const deadSorted = Object.entries(g.deadPicks).sort((a,b)=>b[1].count-a[1].count);

    // For S16, use actual matchup teams as the two sides
    // For deeper rounds, show top picks as "sides"
    let leftTeam, rightTeam, leftSeed, rightSeed, leftProb, rightProb;
    let leftPickers = [], rightPickers = [], leftCount = 0, rightCount = 0;

    if (g.type === 's16') {
      leftTeam = g.t1; rightTeam = g.t2;
      leftSeed = `(${g.s1})`; rightSeed = `(${g.s2})`;
      leftProb = g.prob1; rightProb = g.prob2;
      leftCount = g.picks[g.t1] ? g.picks[g.t1].count : 0;
      rightCount = g.picks[g.t2] ? g.picks[g.t2].count : 0;
      leftPickers = g.picks[g.t1] ? g.picks[g.t1].names : [];
      rightPickers = g.picks[g.t2] ? g.picks[g.t2].names : [];
    } else {
      // Use top two alive picks
      if (sorted.length >= 2) {
        leftTeam = sorted[0][0]; rightTeam = sorted[1][0];
        leftCount = sorted[0][1].count; rightCount = sorted[1][1].count;
        leftPickers = sorted[0][1].names; rightPickers = sorted[1][1].names;
      } else if (sorted.length === 1) {
        leftTeam = sorted[0][0]; rightTeam = '—';
        leftCount = sorted[0][1].count; rightCount = 0;
        leftPickers = sorted[0][1].names; rightPickers = [];
      } else {
        leftTeam = '—'; rightTeam = '—';
      }
      leftSeed = ''; rightSeed = '';
      leftProb = g.prob1; rightProb = g.prob2;
    }

    // Additional picks (3rd, 4th, etc.) for multi-team rounds
    let otherPicks = '';
    if (g.type !== 's16' && sorted.length > 2) {
      const others = sorted.slice(2).map(([team,d]) =>
        `<span class="mc-picker" style="background:var(--bg-3);color:var(--text-2);">${team} (${d.count}): ${d.names.join(', ')}</span>`
      ).join('');
      otherPicks = `<div class="mc-dead-section" style="background:var(--bg-1);">
        <span class="mc-dead-label">Also picked:</span>${others}</div>`;
    }

    // Controversy score badge
    const cScore = g.controversy;
    const cColor = cScore >= 50 ? 'var(--rose)' : cScore >= 30 ? 'var(--orange)' : 'var(--amber)';
    const cBg = cScore >= 50 ? 'var(--rose-dim)' : cScore >= 30 ? 'var(--orange-dim)' : 'var(--amber-dim)';

    // Dead picks
    let deadHtml = '';
    if (deadSorted.length > 0) {
      const deadChips = deadSorted.map(([team,d]) =>
        `<span class="mc-dead-pick">${team} (${d.count}): ${d.names.join(', ')}</span>`
      ).join('');
      deadHtml = `<div class="mc-dead-section"><span class="mc-dead-label">Eliminated picks:</span>${deadChips}</div>`;
    }

    // Pool split bar
    const allPicks = [...sorted, ...deadSorted.map(([t,d])=>[t+'†',d])];
    const barColors = ['var(--emerald)','var(--sky)','var(--violet)','var(--orange)','var(--amber)'];
    let splitHtml = allPicks.map(([t,d],si) => {
      const w = (d.count/total*100).toFixed(1);
      const isDead = t.endsWith('†');
      const col = isDead ? 'var(--bg-4)' : barColors[si%barColors.length];
      return `<div class="mc-sb-seg" style="width:${w}%;background:${col};"></div>`;
    }).join('');

    // Pickers display (show all if ≤8, otherwise show count)
    function pickersHtml(names, count) {
      if(count === 0) return '';
      const chips = names.map(n => `<span class="mc-picker">${n}</span>`).join('');
      return `<div class="mc-pickers">${chips}</div>`;
    }

    const resolvedBadge = isResolved ? `<span class="resolved-badge" style="background:var(--emerald-dim);color:var(--emerald);">Final: ${g.winner}</span>` : '';

    list.innerHTML += `
      <div class="mc ${isResolved?'resolved':''}">
        <div class="mc-side">
          <div class="mc-team"><span class="mc-seed">${leftSeed}</span> ${leftTeam}</div>
          <div class="mc-stats">
            <span><span class="mc-stat-label">Pool </span><span class="mc-stat-val" style="color:var(--emerald);">${Math.round(leftCount/total*100)}%</span></span>
            <span><span class="mc-stat-label">Win </span><span class="mc-stat-val" style="color:var(--sky);">${leftProb}%</span></span>
            <span><span class="mc-stat-label">${leftCount}/${total}</span></span>
          </div>
          ${pickersHtml(leftPickers, leftCount)}
        </div>
        <div class="mc-mid">
          <div class="mc-round">${g.round}</div>
          <div class="mc-vs">vs</div>
          <div class="mc-pts-label">${g.pts} pts</div>
          ${g.region?`<div class="mc-round">${g.region}</div>`:''}
          <div class="mc-score" style="background:${cBg};color:${cColor};">${cScore}</div>
          ${resolvedBadge}
        </div>
        <div class="mc-side right">
          <div class="mc-team">${rightTeam} <span class="mc-seed">${rightSeed}</span></div>
          <div class="mc-stats">
            <span><span class="mc-stat-label">Pool </span><span class="mc-stat-val" style="color:var(--emerald);">${Math.round(rightCount/total*100)}%</span></span>
            <span><span class="mc-stat-label">Win </span><span class="mc-stat-val" style="color:var(--sky);">${rightProb}%</span></span>
            <span><span class="mc-stat-label">${rightCount}/${total}</span></span>
          </div>
          ${pickersHtml(rightPickers, rightCount)}
        </div>
        <div class="mc-splitbar"><div class="mc-sb">${splitHtml}</div></div>
        ${otherPicks}
        ${deadHtml}
      </div>
    `;
  });
}

// ============================================================
renderLB();
renderChamp();
renderMatchups();
</script>
</body>
</html>
